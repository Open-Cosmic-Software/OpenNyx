# Builds the OpenNyx Windows binary on a GitHub-hosted Windows runner.
# Our Linux dev server never needs Windows — it only pushes code; the runner builds.
# See docs/M1-PLAN.md §5 for the rationale.
#
# NOTE: this workflow only produces artifacts once shell/src-tauri/ has been
# generated (see shell/README.md "First-time setup"). Until then the build step is
# expected to no-op / fail fast, which is fine for the M1 scaffold.

name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: shell/src-tauri

      - name: Install frontend deps
        working-directory: shell
        run: npm install

      # WebView2 runtime is preinstalled on windows-latest images.
      - name: Build Tauri app
        working-directory: shell
        run: npm run tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opennyx-windows
          path: |
            shell/src-tauri/target/release/opennyx.exe
            shell/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
